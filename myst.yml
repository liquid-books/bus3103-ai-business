  subtitle: "BUS 3103 — Selected Topics in Business: Artificial Intelligence"
  description: |
    A comprehensive textbook for BUS 3103 at Palm Beach Atlantic University, exploring artificial
    intelligence through the lens of business innovation and Christian stewardship. Covers AI fundamentals,
    machine learning, NLP, computer vision, ethics, robotics, cybersecurity, and the future of work.
  keywords:
