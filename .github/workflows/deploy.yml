# Auto-generated by OpenClaw book-writer
# Deploys MyST book to GitHub Pages on every push to main

name: MyST GitHub Pages Deploy
on:
  push:
    branches: [main]
env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install MyST and Typst
        run: |
          npm install -g mystmd
          curl -Lo typst.tar.xz https://github.com/typst/typst/releases/download/v0.11.1/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xJf typst.tar.xz
          sudo cp typst-x86_64-unknown-linux-musl/typst /usr/local/bin/ || cp typst-x86_64-unknown-linux-musl/typst /home/node/.local/bin/
      - name: Build HTML and PDF Assets
        run: |
          myst build --html
          myst build --pdf
          mkdir -p _build/html/exports
          cp -r _build/exports/*.pdf _build/html/exports/ || true
          cp _build/exports/*.pdf _build/html/ || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
