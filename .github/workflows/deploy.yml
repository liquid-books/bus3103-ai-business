# Deploys MyST book to GitHub Pages on every push to main
name: MyST GitHub Pages Deploy
on:
  push:
    branches: [main]
env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install Typst
        uses: yusancky/setup-typst@v2
        with:
          version: 'v0.12.0'
      - name: Install MyST
        run: npm install -g mystmd
      - name: Build PDFs first
        run: myst build --typst
      - name: Build HTML site (picks up already-built PDFs)
        run: myst build --html
      - name: Debug - list outputs
        run: |
          echo "=== _build/exports ==="
          find _build/exports -name "*.pdf" 2>/dev/null || echo "no exports"
          echo "=== _build/html ==="
          ls _build/html/*.pdf 2>/dev/null || echo "no pdfs in html root"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
