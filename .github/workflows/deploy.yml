# Deploys MyST book to GitHub Pages on every push to main
name: MyST GitHub Pages Deploy
on:
  push:
    branches: [main]
env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install MyST and Typst
        run: |
          npm install -g mystmd
          curl -Lo typst.tar.xz https://github.com/typst/typst/releases/download/v0.12.0/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xJf typst.tar.xz
          sudo cp typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
          typst --version
      - name: Build PDFs first (so HTML site can pick them up)
        run: myst build --typst
      - name: Build HTML site
        run: myst build --html
      - name: Copy PDFs to predictable download paths
        run: |
          mkdir -p _build/html/downloads
          echo "=== All PDFs in entire workspace ==="
          find . -name "*.pdf" -type f -not -path "./.git/*"
          echo "=== Copying all found PDFs ==="
          find . -name "*.pdf" -type f -not -path "./.git/*" -not -path "./_build/html/*" -exec sh -c 'cp "$1" "_build/html/downloads/$(basename "$1")" && echo "OK: $(basename "$1")"' _ {} \;
          echo "=== Downloads dir ==="
          ls -la _build/html/downloads/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
